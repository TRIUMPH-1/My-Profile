<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Imam Hossain | Profile</title>
  <link rel="stylesheet" href="test .css"/>
</head>
<body>

  <!-- Header Section -->
  <header>
    <h1>Imam Hossain</h1>
  </header>

  <!-- Profile Section -->
  <section id="profile">
    <img src="images\WhatsApp Image 2025-04-12 at 01.13.30_16208dee.jpg" alt="Imam Hossain" class="profile-pic"/>
    <p>Hello! I'm Imam, a passionate developer from Bangladesh. I love creating beautiful websites and learning new technologies.</p>
  </section>

  <!-- Skills Section -->
  <section id="skill">
    <h2>SKILLS</h2>
    <ul>
      <li>📄 HTML</li>
      <li>🎨 CSS</li>
      <li>💻 JavaScript</li>
      <li>🐍 PHYTHON</li>
      <li>🖌️ ADOBE PHOTOSHOP</li>
      <li>⚙️ NODE JS</li>
    </ul>
  </section>

  <!-- Contact Form Section -->
  <section id="contact">
    <h2>Contact Me</h2>
    <form action="#" method="post">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </section>

</body>
</html>
